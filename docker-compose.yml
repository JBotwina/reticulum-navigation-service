services:
  postgres:
    image: kartoza/postgis:16-3.4
    platform: linux/arm64
    container_name: pgrouting-pi
    environment:
      POSTGRES_USER: pi
      POSTGRES_PASS: ${POSTGRES_PASSWORD:-your_password_here}
      POSTGRES_DB: spatial_db
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,hstore,postgis_topology,pgrouting
    network_mode: "host"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=$${POSTGRES_PASS} psql -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1' >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  destination-app:
    image: oven/bun:1
    platform: linux/arm64
    container_name: destination-app
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/destination-app
    command:
      [
        "sh",
        "-lc",
        "bun install && bun --bun run dev --host 0.0.0.0 --port 3000",
      ]
    env_file:
      - ./destination-app/.env
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: spatial_db
      POSTGRES_USER: pi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password_here}
      DATABASE_URL: postgres://pi:${POSTGRES_PASSWORD:-your_password_here}@localhost:5432/spatial_db
      GEOCODER_USER_AGENT: destination_directions_bot
      DIRECTIONS_SPEED_KMH: "40"
    volumes:
      - ./:/app
    network_mode: "host"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bun -e \"fetch('http://127.0.0.1:3000/api').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build:
      context: .
      network: host
    platform: linux/arm64
    container_name: destination-bot
    depends_on:
      postgres:
        condition: service_healthy
      destination-app:
        condition: service_healthy
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: spatial_db
      POSTGRES_USER: pi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password_here}
      GEOCODER_USER_AGENT: destination_directions_bot
      NOMINATIM_MIN_INTERVAL_SECONDS: "1.0"
      DIRECTIONS_SPEED_KMH: "40"
      DESTINATION_APP_BASE_URL: ${DESTINATION_APP_BASE_URL:-http://localhost:3000}
      DESTINATION_APP_TIMEOUT_SECONDS: ${DESTINATION_APP_TIMEOUT_SECONDS:-15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BOT_ADMINS: ${BOT_ADMINS:-}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ${RETICULUM_CONFIG_PATH:-/home/your-user/.reticulum}:/root/.reticulum:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    init: true
    network_mode: "host"
    restart: unless-stopped

volumes:
  postgres_data:
